

# ----- set-option -----
set -s default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -s terminal-overrides ",*256col*:RGB"
set -s set-clipboard external

#set -g allow-passthrough on


set -g allow-passthrough all
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -s escape-time 0
set -sg repeat-time 300
set -s focus-events on

set -g renumber-windows on
set -g base-index 1
set -g mouse on
set -g status on
set -g status-keys vi
set -q -g status-utf8 on
set -g status-interval 1
set -g mode-keys vi
set -g display-panes-time 3000
set -g display-time 1000
set -g allow-rename off
set -sg exit-empty on

	
# ----- key-binding -----

# prefix
set -g prefix 'C-s'
unbind C-b
bind-key -T root C-s send-prefix

# windows
bind-key -T root C-y next-window
bind-key -T root C-l previous-window

bind-key -T prefix v next-layout

# new session
bind-key C-c new-session

# kill current pane
bind-key -T prefix x kill-pane

# kill current window
bind-key -T prefix q kill-window

# kill server
bind-key -T prefix Q confirm-before -p "kill-server #W? (y/n)" kill-server

# -- toggle_status
bind w if-shell '[[ $(tmux show -g status | cut -d\  -f2) == "on" ]]' \
'set -g status off' \
'set -g status on'

# reload configuration
bind-key r source-file ~/.config/tmux/tmux.conf \; display '~/.config/tmux/tmux.conf sourced'
bind-key T display-message '#[fg=#DA702C,bold]bold #[fg=#D0A215,italics]italics #[fg=#879A39,underscore]underline #[fg=#CE5D97,bold,italics,underscore]mixed #[fg=#3AA99F]truecolor'

# toggle sync-mode
bind a {
	if -F '#{?synchronize-panes,1,0}' {
		set -w synchronize-panes off
	} {
		set -w synchronize-panes on
	}
}


# copy mode for colemak
bind-key  y copy-mode
bind-key -T copy-mode-vi n                 send-keys -X cursor-left
bind-key -T copy-mode-vi e                 send-keys -X cursor-down
bind-key -T copy-mode-vi u                 send-keys -X cursor-up
bind-key -T copy-mode-vi i                 send-keys -X cursor-right

bind-key -T copy-mode-vi E                 send-keys -X -N 5 cursor-down
bind-key -T copy-mode-vi U                 send-keys -X -N 5 cursor-up

bind-key -T copy-mode-vi N                 send-keys -X start-of-line
bind-key -T copy-mode-vi I                 send-keys -X end-of-line
bind-key -T copy-mode-vi v                 send-keys -X begin-selection
bind-key -T copy-mode-vi \\                send-keys -X next-word-end

if-shell "uname | grep -q Darwin" {
  bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'pbcopy'
} {
  bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
}


# spilit panes
bind-key U split-window -vb -c "#{pane_current_path}"
bind-key E split-window -v -c "#{pane_current_path}"
bind-key N split-window -hb -c "#{pane_current_path}"
bind-key I split-window -h -c "#{pane_current_path}"
bind-key n select-pane -L
bind-key e select-pane -D
bind-key u select-pane -U
bind-key i select-pane -R

# rotate panse
#bind-key -T root C-n rotate-window
#bind-key -T root C-i rotate-window -D



# ----- plugins -----

# tmp
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set-option -g @tpm-install "J";
set-option -g @tpm-update "=";
set-option -g @tpm-clean "L";

# tools
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'fcsonline/tmux-thumbs'

# status bar
#set -g @plugin 'xamut/tmux-network-bandwidth'

# thumbs
set -g @thumbs-key f
set -g @thumbs-alphabet colemak
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy'
set -g @thumbs-bg-color blue
set -g @thumbs-fg-color green
set-option -g @tmux-network-bandwidth-padding 1

# mode-indicator
set -g @mode_indicator_empty_prompt ''
set -g @mode_indicator_empty_mode_style 'fg=#686868'
set -g @mode_indicator_prefix_mode_style 'fg=#FEFFFF,bold'
set -g @mode_indicator_copy_mode_style 'fg=#FEFFFF,bold,underscore'
set -g @mode_indicator_sync_mode_style 'fg=#60FDFF,bold'


# status bar
set -g status-position bottom
set -g status-left '#{?client_prefix,#[fg=#FEFFFF,bold]PREFIX #[fg=#686868]│ ,}#[fg=#C7C7C7] #S #[fg=#686868]│#[fg=#FEFFFF] #W #[fg=#686868]│#[fg=#686868] #{b:pane_current_path} #[fg=#686868]│ #[fg=#C7C7C7]#{tmux_mode_indicator} #(if command -v gitmux >/dev/null 2>&1; then gitmux -cfg ~/.config/tmux/gitmux.conf "#{pane_current_path}"; fi)'
set -g status-right '#[fg=#686868]#{?window_zoomed_flag,[Z] ,}#[fg=#C7C7C7]%Y-%m-%d #[fg=#FEFFFF,bold]%H:%M '

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

set -g status-style 'bg=default,fg=#C7C7C7'
set -g message-style 'fg=#FEFFFF,bold'
set -g message-command-style 'fg=#60FDFF,bold'
set -g mode-style 'fg=#C7C7C7,bg=default'
set -g copy-mode-match-style 'fg=#C7C7C7,bold'
set -g copy-mode-current-match-style 'fg=#FEFFFF,bold,underscore'

# pane borders
set -g pane-border-style 'fg=#686868'
set -g pane-active-border-style 'fg=#FEFFFF'
set -g status-justify 'absolute-centre'
set -g status-right-length 120
set -g status-left-length 200

set -g window-status-current-style 'fg=#FEFFFF,bg=default,bold,underscore'
set -g window-status-style 'fg=#686868,bg=default'
set -g window-status-format '#[fg=#686868,bg=default]  · #I:#W#{?window_zoomed_flag, [Z],} '
set -g window-status-current-format '#[fg=#FEFFFF,bg=default,bold,underscore]  > #I:#W#{?window_zoomed_flag, [Z],} < '

set -g window-status-separator ''
